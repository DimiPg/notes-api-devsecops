apiVersion: apps/v1
kind: Deployment
metadata:
  name: notes-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-app
  template:
    metadata:
      labels:
        app: notes-app
    spec:
      containers:
        - name: notes-app
          image: dimipg/notes-app:v1
          imagePullPolicy: Never   # 🔥 ADD THIS
          ports:
            - containerPort: 8000